<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Registration Form -->
        <div id="registration-section" class="section">
            <h2>Register to Play</h2>
            <form id="registration-form">
                <div class="form-group">
                    <label for="name">Your Name:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="player-number">Your Roll:</label>
                    <input type="text" id="player-number" required>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
        </div>
        <!-- Game Section -->
        <div id="game-section" class="section" style="display: none;">
            <div class="header">
                <h2>Welcome, <span id="player-name"></span>!</h2>
                <p>Player Roll: <span id="player-number-display"></span></p>
                <p>Score: <span id="score">0</span></p>
                <p>Resets Used: <span id="resets-used">0</span>/3</p>
                <p>Rolls Remaining: <span id="rolls-remaining">0</span>/2</p>
            </div>
            <div class="dice-container">
                <div class="dice-wrapper">
                    <div class="dice" id="dice">
                        <!-- Face 1: 1 dot center -->
                        <div class="dice-face face-1">
                            <div class="dot"></div>
                        </div>

                        <!-- Face 2: 2 dots diagonal -->
                        <div class="dice-face face-2">
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>

                        <!-- Face 3: 3 dots diagonal top-right to bottom-left -->
                        <div class="dice-face face-3">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>

                        <!-- Face 4: 4 dots all corners -->
                        <div class="dice-face face-4">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>

                        <!-- Face 5: 5 dots (4 corners + center) -->
                        <div class="dice-face face-5">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>

                        <!-- Face 6: 6 dots (3 left, 3 right) -->
                        <div class="dice-face face-6">
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="boxes-container">
                <div class="box">
                    <label>10th Position</label>
                    <div class="number-box" id="first-box">-</div>
                </div>
                <div class="box">
                    <label>1st Position</label>
                    <div class="number-box" id="second-box">-</div>
                </div>
            </div>
            <div class="controls">
                <button id="roll-btn" class="btn">Roll Dice</button>
                <button id="reset-btn" class="btn btn-reset">Reset Game (-5 points)</button>
            </div>
            <div id="message" class="message"></div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
