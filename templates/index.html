<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salami Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Registration Form -->
        <div id="registration-section" class="section">
            <h2>Register to Play</h2>
            <form id="registration-form">
                <div class="form-group">
                    <label for="name">Your Name:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="player-number">Your Roll:</label>
                    <input type="text" id="player-number" required>
                </div>
                <button type="submit" class="btn">Register</button>
            </form>
        </div>

        <!-- Game Section -->
        <div id="game-section" class="section" style="display: none;">
            <div class="header">
                <h2>Welcome, <span id="player-name"></span>!</h2>
                <p>Player Roll: <span id="player-number-display"></span></p>
                <p>Score: <span id="score">0</span></p>
                <p>Resets Used: <span id="resets-used">0</span>/3</p>
                <p>Rolls Remaining: <span id="rolls-remaining">2</span></p>
            </div>

            <div class="dice-container">
                <div class="dice" id="dice">🎲</div>
            </div>

            <div class="boxes-container">
                <div class="box">
                    <label>10th Position</label>
                    <div class="number-box" id="first-box">-</div>
                </div>
                <div class="box">
                    <label>1st Position</label>
                    <div class="number-box" id="second-box">-</div>
                </div>
            </div>

            <div class="controls">
                <button id="roll-btn" class="btn">Roll Dice</button>
                <button id="reset-btn" class="btn">Reset Game (-5 points)</button>
            </div>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
